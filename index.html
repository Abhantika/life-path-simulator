<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Path Simulator</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        overflow: hidden;
        background: linear-gradient(270deg, #1d2671, #c33764, #0f2027);
        background-size: 600% 600%;
        animation: bgMove 10s ease infinite;
      }

      @keyframes bgMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .card {
        width: 95%;
        max-width: 420px;
        padding: 20px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
        text-align: center;
        position: relative;
        z-index: 2;
      }

      h2 {
        font-size: 20px;
      }

      .road {
        position: relative;
        width: 100%;
        height: 100px;
        margin: 30px 0;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 50px;
        overflow: hidden;
      }

      .character {
        position: absolute;
        top: 20px;
        font-size: 40px;
        transition:
          left 0.4s ease,
          transform 0.2s;
      }

      .character.move {
        transform: scale(1.2);
      }

      .label {
        font-size: 12px;
        position: absolute;
        bottom: -18px;
      }

      .start {
        left: 5%;
      }
      .middle {
        left: 45%;
      }
      .end {
        right: 5%;
      }

      .progress {
        height: 8px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        overflow: hidden;
        margin: 10px 0 20px;
      }

      .fill {
        height: 100%;
        width: 50%;
        background: linear-gradient(90deg, #00f260, #0575e6);
        transition: 0.4s;
      }

      .message {
        font-size: 14px;
        min-height: 50px;
        margin-bottom: 10px;
      }

      .words {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
      }

      .words button {
        padding: 8px 12px;
        margin: 5px;
        border: none;
        border-radius: 8px;
        font-size: 12px;
        cursor: pointer;
        transition: 0.2s;
      }

      .pos {
        background: linear-gradient(45deg, #00f260, #0575e6);
      }

      .neg {
        background: linear-gradient(45deg, #ff416c, #ff4b2b);
      }

      button:hover {
        transform: scale(1.08);
      }

      .particles {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: 1;
        overflow: hidden;
      }

      .particles span {
        position: absolute;
        width: 5px;
        height: 5px;
        background: white;
        opacity: 0.5;
        border-radius: 50%;
        animation: float 8s linear infinite;
      }

      @keyframes float {
        0% {
          transform: translateY(100vh);
        }
        100% {
          transform: translateY(-10vh);
        }
      }

      @media (max-width: 400px) {
        .character {
          font-size: 32px;
        }
        h2 {
          font-size: 18px;
        }
      }
    </style>
  </head>

  <body>
    <div class="particles" id="particles"></div>

    <div class="card">
      <h2>🧠 Life Path Simulator</h2>

      <div class="road" id="road">
        <div class="character" id="char">🙂</div>

        <div class="label start">Failure</div>
        <div class="label middle">Growth</div>
        <div class="label end">Success</div>
      </div>

      <div class="progress">
        <div class="fill" id="fill"></div>
      </div>

      <div class="message" id="msg">
        Your life moves in the direction of the words you accept.
      </div>

      <div class="words" id="words"></div>
    </div>

    <script>
      let position = 50;

      const positive = [
        "You can do it",
        "Keep going",
        "You're strong",
        "Believe in yourself",
        "You matter",
        "You will succeed",
        "Stay focused",
        "You're capable",
      ];

      const negative = [
        "You're useless",
        "You can't do anything",
        "You always fail",
        "Nobody cares",
        "You are weak",
        "You will fail",
        "Give up",
        "Not good enough",
      ];

      function renderWords() {
        const container = document.getElementById("words");
        container.innerHTML = "";

        [...positive.slice(0, 4), ...negative.slice(0, 4)].forEach((word) => {
          let btn = document.createElement("button");
          btn.innerText = word;

          if (positive.includes(word)) {
            btn.className = "pos";
            btn.onclick = () => updatePosition(8);
          } else {
            btn.className = "neg";
            btn.onclick = () => updatePosition(-10);
          }

          container.appendChild(btn);
        });
      }

      renderWords();

      function updatePosition(value) {
        position += value;
        if (position > 100) position = 100;
        if (position < 0) position = 0;

        updateUI();
      }

      function updateUI() {
        const char = document.getElementById("char");
        const fill = document.getElementById("fill");
        const msg = document.getElementById("msg");
        const road = document.getElementById("road");

        const roadWidth = road.offsetWidth;
        const charWidth = char.offsetWidth;
        const maxLeft = roadWidth - charWidth;
        const leftPx = (position / 100) * maxLeft;

        char.style.left = leftPx + "px";
        fill.style.width = position + "%";

        char.classList.add("move");
        setTimeout(() => char.classList.remove("move"), 200);

        if (position > 75) {
          char.innerText = "😄✨";
          msg.innerText = "You are moving toward success with confidence.";
        } else if (position > 50) {
          char.innerText = "🙂";
          msg.innerText = "You are growing slowly but steadily.";
        } else if (position > 25) {
          char.innerText = "😞";
          msg.innerText = "Negative voices are holding you back.";
        } else {
          char.innerText = "😔💔";
          msg.innerText = "You stopped believing in yourself.";
        }
      }

      window.onload = updateUI;

      function createParticles() {
        const container = document.getElementById("particles");
        for (let i = 0; i < 25; i++) {
          let p = document.createElement("span");
          p.style.left = Math.random() * 100 + "%";
          p.style.animationDuration = 5 + Math.random() * 5 + "s";
          container.appendChild(p);
        }
      }
      createParticles();
    </script>
  </body>
</html>
